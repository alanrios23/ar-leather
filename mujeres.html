<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colección Mujer | AR Leather</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        </header>

    <main style="padding-top: 120px;">
        <section class="product-intro">
            <h1 style="text-align: center; font-family: 'Playfair Display'; font-size: 50px;">Vanguardia Femenina</h1>
            <p style="text-align: center; color: #888; max-width: 600px; margin: 0 auto 60px;">Elegancia atemporal con la fuerza del cuero auténtico.</p>
        </section>

        <section class="product-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; padding: 0 5%;">
            <div class="product-card" style="background: #151515; border: 1px solid #222; padding: 20px;">
                <div style="height: 400px; background: #222; margin-bottom: 20px;">
                    </div>
                <h3 style="font-family: 'Playfair Display'; font-size: 24px; margin-bottom: 10px;">Chaqueta Época</h3>
                <div class="tech-specs" style="font-size: 13px; color: #8C7851; border-top: 1px solid #333; padding-top: 15px; margin-top: 15px;">
                    <p><strong>ESTILO:</strong> Contemporáneo / Entallado</p>
                    <p><strong>CUERO:</strong> Nappa Premium 1.1mm (Suave pero resistente)</p>
                    <p><strong>DETALLE:</strong> Acabado Mate con costuras invisibles</p>
                </div>
                <a href="#" class="btn-primary" style="display: block; text-align: center; margin-top: 20px; padding: 15px;">Ver Detalles</a>
            </div>
        </section>
    </main>
</body>
</html>
